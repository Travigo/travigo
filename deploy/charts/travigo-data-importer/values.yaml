# Default values for travigo-data-importer.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

database:
  connectionStringSecret: travigo-mongodb-admin-travigo
  database: travigo
  realtime:
    connectionStringSecret: travigo-realtime-mongodb-travigo
    database: travigo

redis:
  address: "redis-headless.redis:6379"
  passwordSecret: redis-password

elasticsearch:
  address: "https://primary-es-http.elastic:9200"
  accountSecret: "travigo-elasticsearch-user"

bods:
  apiKeySecret: travigo-bods-api

tfl:
  apiKeySecret: travigo-tfl-api-key

ie_nationaltransport:
  apiKeySecret: travigo-ie-nationaltransport-api

se_trafiklab:
  staticSecret: travigo-trafiklab-sweden-static
  realtimeSecret: travigo-trafiklab-sweden-realtime

jp_odpt:
  apiKeySecret: travigo-odtp-japan-gtfs

ch_opentransportdata:
  apiKeySecret: travigo-ch-opentransportdata
  saApiKeySecret: travigo-ch-opentransportdata-sa

nationalRail:
  credentialsSecret: travigo-nationalrail-credentials
  networkRailCredentialsSecret: travigo-networkrail-credentials

image:
  repository: ghcr.io/travigo/travigo
  pullPolicy: Always
  tag: main

cronjobs: []

deployments:
  - name: realtime-all
    args: ["data-importer", "multi-realtime"]

resources: {}
podAnnotations: {}
nameOverride: ""
fullnameOverride: ""

batchRunner:
  enabled: true
  replicaCount: 1
  storagePath: /batch-runs
  # The batch-runner owns an EBS-backed work directory, so keep it on the
  # single-AZ storage node pool with the rest of the stateful workloads.
  nodeSelector:
    workload: storage
  tolerations:
    - key: workload
      operator: Equal
      value: storage
      effect: NoSchedule
  maxActiveTasks: 1
  continueOnFailure: true
  forceImport: false
  allowConcurrentRuns: false
  job:
    backoffLimit: 0
    ttlSecondsAfterFinished: 3600
    activeDeadlineSeconds: 0
  persistence:
    enabled: true
    existingClaim: ""
    size: 4Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    className: ""
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://travigo.app,https://www.travigo.app"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: api.travigo.app
        paths:
          - path: /data-importer(/|$)(.*)
            pathType: ImplementationSpecific
    tls: []
  schedule:
    enabled: true
    cron: "0 2 * * *"
    timeZone: Europe/London
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
