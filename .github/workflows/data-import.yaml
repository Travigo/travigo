name: Batch data import

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}
  push:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      datasets: ${{ steps.discover.outputs.datasets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Discover dataset IDs
        id: discover
        run: |
          set -euo pipefail
          python - <<'PY'
            import glob, yaml, os, json
            root='data/datasources'
            if not os.path.isdir(root):
                raise SystemExit('datasource directory not found: '+root)
            paths=sorted(glob.glob(os.path.join(root,'**','*.yaml'), recursive=True)+glob.glob(os.path.join(root,'**','*.yml'), recursive=True))
            ids=[]
            for path in paths:
                with open(path, 'r', encoding='utf-8') as f:
                    candidate=yaml.safe_load(f)
                if not isinstance(candidate, dict):
                    continue
                source_id=candidate.get('identifier')
                if not source_id:
                    continue
                for ds in candidate.get('datasets', []) or []:
                    if not isinstance(ds, dict):
                        continue
                    if ds.get('importdestination') == 'realtime-queue':
                        continue
                    ds_id=ds.get('identifier')
                    if not ds_id:
                        continue
                    ids.append(f'{source_id}-{ds_id}')
            print(json.dumps(ids))
            print('::set-output name=datasets::'+json.dumps(ids))
          PY

  import-dataset:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dataset: ${{ fromJSON(needs.discover.outputs.datasets) }}
    timeout-minutes: 180
    env:
      GOFLAGS: '-mod=vendor'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.30.1'

      - name: Load kubeconfig from secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Get k8s secrets into env
        run: |
          MONGO_CONN=$(kubectl get secret travigo-mongodb-admin-travigo -n default -o jsonpath='{.data.connectionString\.standard}' | base64 --decode)
          REDIS_PASSWORD=$(kubectl get secret redis-password -n default -o jsonpath='{.data.password}' | base64 --decode)
          ES_USERNAME=$(kubectl get secret travigo-elasticsearch-user -n default -o jsonpath='{.data.username}' | base64 --decode)
          ES_PASSWORD=$(kubectl get secret travigo-elasticsearch-user -n default -o jsonpath='{.data.password}' | base64 --decode)
          BODS_API_KEY=$(kubectl get secret travigo-bods-api -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          IE_NATIONAL_API_KEY=$(kubectl get secret travigo-ie-nationaltransport-api -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          NR_USER=$(kubectl get secret travigo-nationalrail-credentials -n default -o jsonpath='{.data.username}' | base64 --decode)
          NR_PASS=$(kubectl get secret travigo-nationalrail-credentials -n default -o jsonpath='{.data.password}' | base64 --decode)
          NWR_USER=$(kubectl get secret travigo-networkrail-credentials -n default -o jsonpath='{.data.username}' | base64 --decode)
          NWR_PASS=$(kubectl get secret travigo-networkrail-credentials -n default -o jsonpath='{.data.password}' | base64 --decode)
          SE_STATIC_KEY=$(kubectl get secret travigo-trafiklab-sweden-static -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          SE_REALTIME_KEY=$(kubectl get secret travigo-trafiklab-sweden-realtime -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          JP_ODPT_KEY=$(kubectl get secret travigo-odtp-japan-gtfs -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          echo "TRAVIGO_MONGODB_CONNECTION=$MONGO_CONN" >> $GITHUB_ENV
          echo "TRAVIGO_REDIS_PASSWORD=$REDIS_PASSWORD" >> $GITHUB_ENV
          echo "TRAVIGO_ELASTICSEARCH_USERNAME=$ES_USERNAME" >> $GITHUB_ENV
          echo "TRAVIGO_ELASTICSEARCH_PASSWORD=$ES_PASSWORD" >> $GITHUB_ENV
          echo "TRAVIGO_BODS_API_KEY=$BODS_API_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_IE_NATIONALTRANSPORT_API_KEY=$IE_NATIONAL_API_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_NATIONALRAIL_USERNAME=$NR_USER" >> $GITHUB_ENV
          echo "TRAVIGO_NATIONALRAIL_PASSWORD=$NR_PASS" >> $GITHUB_ENV
          echo "TRAVIGO_NETWORKRAIL_USERNAME=$NWR_USER" >> $GITHUB_ENV
          echo "TRAVIGO_NETWORKRAIL_PASSWORD=$NWR_PASS" >> $GITHUB_ENV
          echo "TRAVIGO_SE_TRAFIKLAB_STATIC_API_KEY=$SE_STATIC_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_SE_TRAFIKLAB_REALTIME_API_KEY=$SE_REALTIME_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_JP_ODPT_API_KEY=$JP_ODPT_KEY" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Build travigo binary
        run: go build -o travigo ./cmd/travigo

      - name: Run data-importer dataset
        run: |
          echo "=== Importing dataset: ${{ matrix.dataset }} ==="
          ./travigo data-importer dataset --id "${{ matrix.dataset }}"

  postprocess:
    needs: import-dataset
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GOFLAGS: '-mod=vendor'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.30.1'

      - name: Load kubeconfig from secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Get k8s secrets into env
        run: |
          MONGO_CONN=$(kubectl get secret travigo-mongodb-admin-travigo -n default -o jsonpath='{.data.connectionString\.standard}' | base64 --decode)
          REDIS_PASSWORD=$(kubectl get secret redis-password -n default -o jsonpath='{.data.password}' | base64 --decode)
          ES_USERNAME=$(kubectl get secret travigo-elasticsearch-user -n default -o jsonpath='{.data.username}' | base64 --decode)
          ES_PASSWORD=$(kubectl get secret travigo-elasticsearch-user -n default -o jsonpath='{.data.password}' | base64 --decode)
          BODS_API_KEY=$(kubectl get secret travigo-bods-api -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          IE_NATIONAL_API_KEY=$(kubectl get secret travigo-ie-nationaltransport-api -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          NR_USER=$(kubectl get secret travigo-nationalrail-credentials -n default -o jsonpath='{.data.username}' | base64 --decode)
          NR_PASS=$(kubectl get secret travigo-nationalrail-credentials -n default -o jsonpath='{.data.password}' | base64 --decode)
          NWR_USER=$(kubectl get secret travigo-networkrail-credentials -n default -o jsonpath='{.data.username}' | base64 --decode)
          NWR_PASS=$(kubectl get secret travigo-networkrail-credentials -n default -o jsonpath='{.data.password}' | base64 --decode)
          SE_STATIC_KEY=$(kubectl get secret travigo-trafiklab-sweden-static -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          SE_REALTIME_KEY=$(kubectl get secret travigo-trafiklab-sweden-realtime -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          JP_ODPT_KEY=$(kubectl get secret travigo-odtp-japan-gtfs -n default -o jsonpath='{.data.api_key}' | base64 --decode)
          echo "TRAVIGO_MONGODB_CONNECTION=$MONGO_CONN" >> $GITHUB_ENV
          echo "TRAVIGO_REDIS_PASSWORD=$REDIS_PASSWORD" >> $GITHUB_ENV
          echo "TRAVIGO_ELASTICSEARCH_USERNAME=$ES_USERNAME" >> $GITHUB_ENV
          echo "TRAVIGO_ELASTICSEARCH_PASSWORD=$ES_PASSWORD" >> $GITHUB_ENV
          echo "TRAVIGO_BODS_API_KEY=$BODS_API_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_IE_NATIONALTRANSPORT_API_KEY=$IE_NATIONAL_API_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_NATIONALRAIL_USERNAME=$NR_USER" >> $GITHUB_ENV
          echo "TRAVIGO_NATIONALRAIL_PASSWORD=$NR_PASS" >> $GITHUB_ENV
          echo "TRAVIGO_NETWORKRAIL_USERNAME=$NWR_USER" >> $GITHUB_ENV
          echo "TRAVIGO_NETWORKRAIL_PASSWORD=$NWR_PASS" >> $GITHUB_ENV
          echo "TRAVIGO_SE_TRAFIKLAB_STATIC_API_KEY=$SE_STATIC_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_SE_TRAFIKLAB_REALTIME_API_KEY=$SE_REALTIME_KEY" >> $GITHUB_ENV
          echo "TRAVIGO_JP_ODPT_API_KEY=$JP_ODPT_KEY" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Build travigo binary
        run: go build -o travigo ./cmd/travigo

      - name: Run data-linker stops
        run: ./travigo data-linker run --type stops

      - name: Run data-linker services
        run: ./travigo data-linker run --type services

      - name: Run indexer stops
        run: ./travigo indexer stops
