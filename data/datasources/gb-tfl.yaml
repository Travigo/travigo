identifier: gb-tfl
region: gb
provider:
  name: Transport for London
  website: "https://tfl.gov.uk/"
datasets:
- identifier: tfl-api
  format: tfl-json
  source: "https://api.tfl.gov.uk"
  supportedobjects:
    realtimejourneys: true
    servicealerts: true
  sourceauthentication:
    query:
      api_key: TRAVIGO_TFL_API_KEY
  linkeddataset: gb-dft-bods-gtfs-schedule-*
  importdestination: specific-runner
- identifier: route-tracks
  format: gb-tfl-route-tracks
  datasetsize: enrichment
  refreshinterval: 168h
  supportedobjects:
    journeytracks: true
  customconfig:
    modes: tube,dlr,tram,river-bus,cable-car,bus
